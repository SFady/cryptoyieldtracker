name: Cron Heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Debug URL
        run: echo "Calling ${{ secrets.APP_URL }}/api/cron"

      - name: Ping cron endpoint
        run: |
          BASE_URL="${{ secrets.APP_URL }}"
          BASE_URL="${BASE_URL%/}"
          BASE_URL="${BASE_URL//\"/}"
          RESPONSE=$(curl -s -X POST "${BASE_URL}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $RESPONSE"
